# 显式指定项目名称，确保所有容器都在 nutriai 项目下
# 生产环境使用阿里云 ACR 存放应用镜像，Redis 默认走阿里云公共镜像
name: nutriai

services:
  redis:
    image: ${REDIS_IMAGE:-registry.cn-hangzhou.aliyuncs.com/acs/redis:6.0-alpine}
    restart: always
    command: redis-server --appendonly yes --requirepass "${REDIS_PASSWORD}" --maxmemory 64mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    mem_limit: 128m
    memswap_limit: 128m
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - nutriai-network

  backend:
    image: ${ACR_REGISTRY:-crpi-lds0nj6fmrvtaiga.cn-beijing.personal.cr.aliyuncs.com}/${ACR_NAMESPACE:-heyitshuo1}/${BACKEND_IMAGE_REPO:-nutriai-backend}:${IMAGE_TAG}
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST_NEI: ${DB_HOST_NEI}
      DB_PORT_NEI: ${DB_PORT_NEI:-3306}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_USE_SSL: ${DB_USE_SSL:-false}
      DB_REQUIRE_SSL: ${DB_REQUIRE_SSL:-false}
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      AI_API_KEY: ${AI_API_KEY}
      AI_BASE_URL: ${AI_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      AI_MODEL_NAME: ${AI_MODEL_NAME:-qwen3.5-122b-a10b}
      AI_DIET_PLAN_MODEL: ${AI_DIET_PLAN_MODEL:-qwen3.5-flash}
      COS_SECRET_ID: ${COS_SECRET_ID}
      COS_SECRET_KEY: ${COS_SECRET_KEY}
      COS_REGION: ${COS_REGION}
      COS_BUCKET: ${COS_BUCKET}
      COS_URL: ${COS_URL}
      COS_CUSTOM_DOMAIN: ${COS_CUSTOM_DOMAIN:-}
      BAIDU_AI_APP_ID: ${BAIDU_AI_APP_ID:-}
      BAIDU_AI_API_KEY: ${BAIDU_AI_API_KEY:-}
      BAIDU_AI_SECRET_KEY: ${BAIDU_AI_SECRET_KEY:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT:-465}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_NICKNAME: ${MAIL_NICKNAME:-NutriAI健康饮食助手}
      SMS_SECRET_ID: ${SMS_SECRET_ID:-}
      SMS_SECRET_KEY: ${SMS_SECRET_KEY:-}
      SMS_SDK_APP_ID: ${SMS_SDK_APP_ID:-}
      SMS_SIGN_NAME: ${SMS_SIGN_NAME:-NutriAI}
      SMS_TEMPLATE_ID: ${SMS_TEMPLATE_ID:-}
      EPAY_MERCHANT_ID: ${EPAY_MERCHANT_ID:-}
      EPAY_MERCHANT_KEY: ${EPAY_MERCHANT_KEY:-}
      EPAY_API_URL: ${EPAY_API_URL:-}
      EPAY_SUBMIT_URL: ${EPAY_SUBMIT_URL:-}
      EPAY_MAPI_URL: ${EPAY_MAPI_URL:-}
      EPAY_NOTIFY_URL: ${EPAY_NOTIFY_URL:-}
      EPAY_RETURN_URL: ${EPAY_RETURN_URL:-}
      JAVA_OPTS: -Xms256m -Xmx384m -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -Duser.timezone=Asia/Shanghai
    mem_limit: 512m
    memswap_limit: 512m
    ports:
      - "8080:8080"
    networks:
      - nutriai-network

  frontend:
    image: ${ACR_REGISTRY:-crpi-lds0nj6fmrvtaiga.cn-beijing.personal.cr.aliyuncs.com}/${ACR_NAMESPACE:-heyitshuo1}/${FRONTEND_IMAGE_REPO:-nutriai-frontend}:${IMAGE_TAG}
    restart: always
    depends_on:
      - backend
    mem_limit: 64m
    memswap_limit: 64m
    ports:
      - "3000:80"
    networks:
      - nutriai-network

networks:
  nutriai-network:
    driver: bridge

volumes:
  redis-data:
