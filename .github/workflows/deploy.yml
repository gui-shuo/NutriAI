name: Deploy to Tencent Cloud

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  TCR_REGISTRY: ccr.ccs.tencentyun.com
  TCR_NAMESPACE: heyitshuo
  DEPLOY_DIR: /www/wwwroot/nutriai
  COMPOSE_FILE: docker-compose.prod.yml

jobs:
  deploy:
    name: 构建时间戳镜像并部署到腾讯云
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v5

      - name: 生成时间戳镜像标签
        run: |
          echo "IMAGE_TAG=$(TZ=Asia/Shanghai date +'%Y%m%d%H%M%S')" >> "$GITHUB_ENV"
          echo "最新提交: $(git log --oneline -1)"

      - name: 校验镜像标签策略
        run: |
          if [ -z "${IMAGE_TAG}" ] || [ "${IMAGE_TAG}" = "latest" ]; then
            echo "ERROR: 镜像标签必须为时间戳，禁止使用 latest" >&2
            exit 1
          fi

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录腾讯云 TCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.TCR_REGISTRY }}
          username: ${{ secrets.TCR_USERNAME }}
          password: ${{ secrets.TCR_PASSWORD }}

      - name: 构建并推送后端镜像
        timeout-minutes: 20
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          platforms: linux/amd64
          provenance: false
          sbom: false
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=min,scope=backend
          build-args: |
            MAVEN_BUILDER_IMAGE=maven:3.9-eclipse-temurin-17
            JAVA_RUNTIME_IMAGE=eclipse-temurin:17-jre-alpine
          tags: ${{ env.TCR_REGISTRY }}/${{ env.TCR_NAMESPACE }}/nutriai-backend:${{ env.IMAGE_TAG }}

      - name: 构建并推送前端镜像
        timeout-minutes: 15
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          platforms: linux/amd64
          provenance: false
          sbom: false
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=min,scope=frontend
          build-args: |
            NODE_BUILDER_IMAGE=node:20-alpine
            NGINX_RUNTIME_IMAGE=nginx:1.25-alpine
          tags: ${{ env.TCR_REGISTRY }}/${{ env.TCR_NAMESPACE }}/nutriai-frontend:${{ env.IMAGE_TAG }}

      - name: 编码生产 Compose 配置
        run: |
          echo "COMPOSE_FILE_B64=$(base64 -w 0 docker-compose.prod.yml)" >> "$GITHUB_ENV"

      - name: 拉取最新镜像并重启腾讯云容器
        uses: appleboy/ssh-action@v1.2.5
        env:
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          TCR_REGISTRY: ${{ env.TCR_REGISTRY }}
          TCR_NAMESPACE: ${{ env.TCR_NAMESPACE }}
          TCR_USERNAME: ${{ secrets.TCR_USERNAME }}
          TCR_PASSWORD: ${{ secrets.TCR_PASSWORD }}
          DEPLOY_DIR: ${{ env.DEPLOY_DIR }}
          COMPOSE_FILE: ${{ env.COMPOSE_FILE }}
          COMPOSE_FILE_B64: ${{ env.COMPOSE_FILE_B64 }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          version: 1.8.4
          envs: IMAGE_TAG,TCR_REGISTRY,TCR_NAMESPACE,TCR_USERNAME,TCR_PASSWORD,DEPLOY_DIR,COMPOSE_FILE,COMPOSE_FILE_B64
          script_stop: true
          command_timeout: 500m
          script: |
            set -e

            require_env() {
              local key="$1"
              local current_value
              current_value="$(grep -E "^${key}=" .env 2>/dev/null | tail -n 1 | cut -d= -f2-)"
              if [ -z "$current_value" ]; then
                echo "ERROR: 服务器 .env 缺少 ${key} 配置" >&2
                exit 1
              fi
            }

            upsert_env() {
              local key="$1"
              local value="$2"
              if grep -q "^${key}=" .env 2>/dev/null; then
                sed -i "s|^${key}=.*|${key}=${value}|" .env
              else
                printf '%s=%s\n' "$key" "$value" >> .env
              fi
            }

            retry_pull() {
              local image="$1"
              local attempt=1
              while [ "$attempt" -le 3 ]; do
                echo "拉取镜像 ${image}，第 ${attempt} 次尝试..."
                if docker pull "$image"; then
                  return 0
                fi
                attempt=$((attempt + 1))
                sleep 10
              done
              return 1
            }

            if [ -z "$IMAGE_TAG" ] || [ "$IMAGE_TAG" = "latest" ]; then
              echo "ERROR: 镜像标签必须为时间戳，禁止使用 latest" >&2
              exit 1
            fi

            mkdir -p "$DEPLOY_DIR"
            cd "$DEPLOY_DIR"

            if [ -z "$COMPOSE_FILE_B64" ]; then
              echo "ERROR: 生产 Compose 配置内容为空" >&2
              exit 1
            fi

            printf '%s' "$COMPOSE_FILE_B64" | base64 -d > "${COMPOSE_FILE}.tmp"
            mv "${COMPOSE_FILE}.tmp" "$COMPOSE_FILE"

            if [ ! -f .env ]; then
              echo "ERROR: 服务器缺少 .env 文件，请先准备运行时配置" >&2
              exit 1
            fi

            require_env DB_HOST_NEI
            require_env DB_PORT_NEI
            require_env COS_URL

            upsert_env IMAGE_TAG "$IMAGE_TAG"
            upsert_env TCR_REGISTRY "$TCR_REGISTRY"
            upsert_env TCR_NAMESPACE "$TCR_NAMESPACE"
            chmod 600 .env

            echo "$TCR_PASSWORD" | docker login "$TCR_REGISTRY" -u "$TCR_USERNAME" --password-stdin

            COMPOSE_CMD="docker compose"
            if ! docker compose version >/dev/null 2>&1; then
              COMPOSE_CMD="docker-compose"
            fi

            BACKEND_IMAGE="${TCR_REGISTRY}/${TCR_NAMESPACE}/nutriai-backend:${IMAGE_TAG}"
            FRONTEND_IMAGE="${TCR_REGISTRY}/${TCR_NAMESPACE}/nutriai-frontend:${IMAGE_TAG}"

            retry_pull "$BACKEND_IMAGE"
            retry_pull "$FRONTEND_IMAGE"

            $COMPOSE_CMD -p nutriai -f "$COMPOSE_FILE" down --remove-orphans || true
            docker container prune -f >/dev/null 2>&1 || true
            $COMPOSE_CMD -p nutriai -f "$COMPOSE_FILE" up -d --force-recreate
            $COMPOSE_CMD -p nutriai -f "$COMPOSE_FILE" ps

            docker image ls "${TCR_REGISTRY}/${TCR_NAMESPACE}/nutriai-backend" --format '{{.Repository}}:{{.Tag}}' | grep -v ":${IMAGE_TAG}$" | xargs -r docker rmi -f || true
            docker image ls "${TCR_REGISTRY}/${TCR_NAMESPACE}/nutriai-frontend" --format '{{.Repository}}:{{.Tag}}' | grep -v ":${IMAGE_TAG}$" | xargs -r docker rmi -f || true
            docker image prune -f >/dev/null 2>&1 || true
            docker logout "$TCR_REGISTRY" || true

      - name: 输出部署摘要
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "## ✅ 腾讯云部署成功" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## ❌ 腾讯云部署失败" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "- 镜像标签: ${{ env.IMAGE_TAG }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- 镜像仓库: ${{ env.TCR_REGISTRY }}/${{ env.TCR_NAMESPACE }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- 服务器: ${{ secrets.SERVER_HOST }}" >> "$GITHUB_STEP_SUMMARY"
