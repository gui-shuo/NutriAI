server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 20m;

    # WebSocket 路径（必须在 /api/ 之前匹配）
    location /api/ws/ {
        proxy_pass http://backend:8080/api/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 200s;
    }

    # H5 移动端 (PWA)
    location /h5/ {
        alias /usr/share/nginx/h5/;
        try_files $uri $uri/ /h5/index.html;

        location ~* \.(js|css|png|jpg|svg|woff2?|webmanifest)$ {
            expires 30d;
            add_header Cache-Control "public";
        }
        location = /h5/sw.js {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
        location = /h5/index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    # JS/CSS 资源文件——带内容哈希，长期缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
        # 对 index.html 禁用缓存，确保每次都加载最新版本
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires 0;
        }
    }
}
