version: '1.0'
name: nutriai-gitee-go-tcr
displayName: NutriAI-Gitee-Go-TCR-自动部署
triggers:
  trigger: auto
  push:
    tags:
      precise:
        - manual-deploy
variables:
  BACKEND_IMAGE_REPO: nutriai-backend
  FRONTEND_IMAGE_REPO: nutriai-frontend
  REDIS_IMAGE: registry.cn-hangzhou.aliyuncs.com/acs/redis:6.0-alpine
  DEPLOY_DIR: /www/wwwroot/nutriai
stages:
  - name: prepare
    displayName: 准备部署参数
    strategy: naturally
    trigger: auto
    steps:
      - step: build@gcc
        name: prepare_metadata
        displayName: 生成时间戳与部署包
        gccVersion: 10.3
        commands:
          - mkdir -p .gitee-go-output
          - TIMESTAMP_TAG="$(TZ=Asia/Shanghai date +%Y%m%d%H%M%S)"
          - echo "TIMESTAMP_TAG=${TIMESTAMP_TAG}" >> GITEE_PARAMS
          - cp docker-compose.prod.yml .gitee-go-output/docker-compose.prod.yml
          - tar -czf .gitee-go-output/nutriai-deploy-bundle.tar.gz -C .gitee-go-output docker-compose.prod.yml
        artifacts:
          - name: DEPLOY_BUNDLE
            path:
              - ./.gitee-go-output/nutriai-deploy-bundle.tar.gz
        strategy: {}
  - name: build_images
    displayName: 构建并推送镜像
    strategy: naturally
    trigger: auto
    steps:
      - step: build@docker
        name: build_backend_image
        displayName: 构建后端镜像
        type: cert
        certificate: heyitshuo
        tag: ${BACKEND_IMAGE_REPO}:${TIMESTAMP_TAG}
        dockerfile: ./Dockerfile.backend.gitee
        isCache: true
        strategy: {}
      - step: build@docker
        name: build_frontend_image
        displayName: 构建前端镜像
        type: cert
        certificate: heyitshuo
        tag: ${FRONTEND_IMAGE_REPO}:${TIMESTAMP_TAG}
        dockerfile: ./Dockerfile.frontend.gitee
        isCache: true
        strategy: {}
  - name: deploy
    displayName: 部署到腾讯云服务器
    strategy: naturally
    trigger: auto
    steps:
      - step: deploy@agent
        name: deploy_to_tencent_cvm
        displayName: 远端部署
        hostGroupID:
          ID: heyitshuo
          hostID:
            - affe1a88-9d72-444c-9794-a06d0a720c71
        deployArtifact:
          - source: build
            name: nutriai-deploy-bundle
            target: ${DEPLOY_DIR}/.gitee-go
            dependArtifact: DEPLOY_BUNDLE
        script:
          - set -e
          - ''
          - DEPLOY_DIR="${DEPLOY_DIR}"
          - COMPOSE_FILE="${DEPLOY_DIR}/docker-compose.prod.yml"
          - BUNDLE_DIR="${DEPLOY_DIR}/.gitee-go"
          - BUNDLE_FILE="${BUNDLE_DIR}/nutriai-deploy-bundle"
          - ''
          - upsert_env() {
          - '  local key="$1"'
          - '  local value="$2"'
          - '  if grep -q "^${key}=" .env 2>/dev/null; then'
          - '    sed -i "s|^${key}=.*|${key}=${value}|" .env'
          - '  else'
          - '    printf ''%s=%s\n'' "$key" "$value" >> .env'
          - '  fi'
          - '}'
          - ''
          - mkdir -p "$DEPLOY_DIR" "$BUNDLE_DIR"
          - cd "$DEPLOY_DIR"
          - ''
          - if [ ! -f .env ]; then
          - '  echo "ERROR: 服务器缺少 .env 文件，请先按 README 创建运行时配置。" >&2'
          - '  exit 1'
          - fi
          - ''
          - if [ ! -f "$BUNDLE_FILE" ]; then
          - '  echo "ERROR: 部署包不存在: $BUNDLE_FILE" >&2'
          - '  exit 1'
          - fi
          - ''
          - tar -xzf "$BUNDLE_FILE" -C "$BUNDLE_DIR"
          - cp "$BUNDLE_DIR/docker-compose.prod.yml" "$COMPOSE_FILE"
          - ''
          - upsert_env IMAGE_TAG "${TIMESTAMP_TAG}"
          - upsert_env TCR_REGISTRY "${TCR_REGISTRY}"
          - upsert_env TCR_NAMESPACE "${TCR_NAMESPACE}"
          - upsert_env BACKEND_IMAGE_REPO "${BACKEND_IMAGE_REPO}"
          - upsert_env FRONTEND_IMAGE_REPO "${FRONTEND_IMAGE_REPO}"
          - upsert_env REDIS_IMAGE "${REDIS_IMAGE}"
          - chmod 600 .env || true
          - ''
          - echo "${TCR_PASSWORD}" | docker login "${TCR_REGISTRY}" -u "${TCR_USERNAME}" --password-stdin
          - ''
          - COMPOSE_CMD="docker compose"
          - if ! docker compose version >/dev/null 2>&1; then
          - '  COMPOSE_CMD="docker-compose"'
          - fi
          - ''
          - $COMPOSE_CMD --env-file .env -p nutriai -f "$COMPOSE_FILE" pull redis backend frontend
          - $COMPOSE_CMD --env-file .env -p nutriai -f "$COMPOSE_FILE" up -d --force-recreate --remove-orphans
          - $COMPOSE_CMD --env-file .env -p nutriai -f "$COMPOSE_FILE" ps
          - ''
          - docker ps -aq --filter label=com.docker.compose.project=nutriai --filter status=exited | xargs -r docker rm -f >/dev/null 2>&1 || true
          - docker ps -aq --filter label=com.docker.compose.project=nutriai --filter status=created | xargs -r docker rm -f >/dev/null 2>&1 || true
          - docker image ls "${TCR_REGISTRY}/${TCR_NAMESPACE}/${BACKEND_IMAGE_REPO}" --format '{{.Repository}}:{{.Tag}}' | grep -E ':[0-9]{14}$' | grep -v ":${TIMESTAMP_TAG}$" | xargs -r docker rmi -f >/dev/null 2>&1 || true
          - docker image ls "${TCR_REGISTRY}/${TCR_NAMESPACE}/${FRONTEND_IMAGE_REPO}" --format '{{.Repository}}:{{.Tag}}' | grep -E ':[0-9]{14}$' | grep -v ":${TIMESTAMP_TAG}$" | xargs -r docker rmi -f >/dev/null 2>&1 || true
          - docker image prune -f >/dev/null 2>&1 || true
          - docker logout "${TCR_REGISTRY}" || true
          - ''
        strategy: {}
strategy:
  blocking: true
  stepTimeout: 60
